version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    restart: always

    # Set QDRANT_STORAGE_DIR (e.g. to ~/.cursor/memory/qdrant/<EMBEDDING_MODEL_ID>/data)
    # to control where Qdrant stores its data on the host. Defaults to ./storage.
    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - ${HOME}/.cursor/memory/qdrant:/qdrant/storage

    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__STORAGE__WAL_CAPACITY_MB: 64
      QDRANT__STORAGE__WAL_SEGMENTS_AHEAD: 0

  qdrant-init:
    image: curlimages/curl:8.5.0
    depends_on:
      qdrant:
        condition: service_started
    restart: "no"
    entrypoint: >
      sh -c "
      echo 'Waiting for Qdrant to become ready...';
      until curl -sf http://qdrant:6333/collections > /dev/null; do
        echo 'Qdrant not ready yet, sleeping...';
        sleep 2;
      done;

      echo 'Creating collections if missing...';
      curl -s -X PUT http://qdrant:6333/collections/org_memory \
        -H 'Content-Type: application/json' \
        -d '{
          \"vectors\": {
            \"size\": 384,
            \"distance\": \"Cosine\"
          }
        }' || true;
      curl -s -X PUT http://qdrant:6333/collections/project_memory \
        -H 'Content-Type: application/json' \
        -d '{
          \"vectors\": {
            \"size\": 384,
            \"distance\": \"Cosine\"
          }
        }' || true;
      curl -s -X PUT http://qdrant:6333/collections/session_memory \
        -H 'Content-Type: application/json' \
        -d '{
          \"vectors\": {
            \"size\": 384,
            \"distance\": \"Cosine\"
          }
        }' || true;
      curl -s -X PUT http://qdrant:6333/collections/cache_memory \
        -H 'Content-Type: application/json' \
        -d '{
          \"vectors\": {
            \"size\": 384,
            \"distance\": \"Cosine\"
          }
        }' || true;

      echo 'Init complete';
      "
