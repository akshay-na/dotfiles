# Rule Priority Configuration
# Defines defaults, priority bands, and rule-specific settings for enforcement

version: 1

defaults:
  priority: 500
  enforcement: advisory
  pre_action: false
  post_action: true

priority_bands:
  critical:
    range: [900, 1000]
    description: Security, error handling - must never be violated
  standard:
    range: [400, 600]
    description: Conventions, style - should be followed
  informational:
    range: [0, 200]
    description: Suggestions, best practices - nice to have

overrides:
  - rule: local-overrides
    can_override: [shell-conventions, toml-configs, git-conventions]
  - rule: error-handling-and-security
    enforcement: strict
    priority: 900

rule_defaults:
  # Critical rules - security and error handling
  error-handling-and-security:
    priority: 900
    enforcement: strict
    pre_action: true
    post_action: true
    tags: [security, error-handling, critical]

  # High priority - orchestration and memory
  agent-orchestration:
    priority: 800
    enforcement: strict
    pre_action: false
    post_action: true
    tags: [orchestration, agents]

  memory:
    priority: 700
    enforcement: strict
    pre_action: false
    post_action: true
    tags: [memory, context]

  # Structure rules - important for consistency
  stow-structure:
    priority: 700
    enforcement: strict
    pre_action: true
    post_action: true
    tags: [structure, stow, dotfiles]

  # Convention rules - advisory level
  shell-conventions:
    priority: 500
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [conventions, shell, bash, zsh]

  git-conventions:
    priority: 500
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [conventions, git, commits]

  toml-configs:
    priority: 500
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [conventions, toml, config]

  # Override rule - allows local customization
  local-overrides:
    priority: 600
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [overrides, local]

  # Mode selection - important for agent behavior
  mode-auto-selection:
    priority: 600
    enforcement: advisory
    pre_action: true
    post_action: false
    tags: [modes, agents, workflow]

  # Documentation rules
  docs-and-decisions:
    priority: 400
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [documentation, decisions]

  # Testing rules
  testing:
    priority: 500
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [testing, quality]

  # Observability rules
  observability:
    priority: 500
    enforcement: advisory
    pre_action: false
    post_action: true
    tags: [observability, logging, metrics]
