name: refactor
description: Refactoring workflow with analysis, planning, and quality review
version: 2
max_retries: 3

stages:
  - id: analyze
    agent: staff-engineer
    mode: plan
    description: Analyze code for refactoring opportunities
    inputs: [task_description, target_files]
    outputs: [analysis, refactoring_recommendations]
    timeout_minutes: 20

  - id: plan
    agent: cto
    mode: plan
    description: Create refactoring plan with safety checks
    inputs: [analysis, refactoring_recommendations]
    outputs: [implementation_plan]
    requires_approval: true
    timeout_minutes: 15

  - id: implement
    agent: tech-lead
    mode: agent
    description: Execute refactoring with pre-execution validation
    inputs: [implementation_plan]
    outputs: [code_changes]
    timeout_minutes: 45
    retry:
      max_attempts: 3
      backoff: exponential
      initial_delay_seconds: 5
    rollback:
      strategy: git_revert
      description: "Revert all refactoring commits"
    skill: closed-loop-execution

  - id: verify
    agent: tech-lead
    mode: agent
    description: Verify behavior unchanged — run full test suite and regression check
    inputs: [code_changes, analysis]
    outputs: [verification_results]
    timeout_minutes: 20
    retry:
      max_attempts: 2
      backoff: fixed
      initial_delay_seconds: 3
    skill: closed-loop-execution

  - id: quality_review
    agent: staff-engineer
    mode: plan
    description: Verify refactoring improves code quality
    inputs: [code_changes, analysis, verification_results]
    outputs: [quality_review, feedback_items]
    timeout_minutes: 15
    feedback_loop:
      target_stage: implement
      max_iterations: 2
