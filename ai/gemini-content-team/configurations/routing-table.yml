version: 1

pipeline_override:
  patterns:
    - "use pipeline: {name}"
    - "pipeline: {name}"
  validation: pipeline must exist under ~/.cursor/configurations/pipelines/
    (content org pack stowed)

workspace:
  repo_detection:
    - file paths in task
    - cwd
  isolation:
    - Each repo has its own `.cursor/agents/`; `content-lead` is org-tier.
  agent_resolution:
    executor: content-lead
    org_agents:
      - cco
      - editorial-cro
      - vp-editorial-architecture
      - vp-audience-engineering
      - editorial-ops-lead
      - vp-editorial-platform
      - staff-editor
      - cpo
      - vp-research
      - chief-profile-metrics
      - chief-growth-strategy
    last_resort: staff-editor

classification:
  content_article:
    signals:
      - "blog"
      - "article"
      - "newsletter"
      - "draft"
      - "content"
      - "publish"
      - "linkedin"
    default_pipeline: article
    default_agents: [ cco, content-lead ]
    requires_plan: true

  content_automation:
    signals:
      - "n8n"
      - "automation"
      - "correction_brief"
    default_pipeline: article
    default_agents: [ content-lead ]
    requires_plan: false

default_task:
  fallback_pipeline: article
  primary_executor: content-lead
