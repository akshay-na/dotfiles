version: 1
id: article
description: Plan → generate editorial assets → git commit/push (SSH)

stages:
  - id: git_sync
    owner: content-lead
    action: pull_fetch_rebase
    optional: false
  - id: plan
    owner: cco
    action: write_plan_v0
    optional: false
  - id: critic
    owner: editorial-cro
    action: editorial_cro_loop
    optional: true
  - id: generate_content
    owner: content-lead
    action: dispatch_project_agents
    optional: false
  - id: git_commit_push
    owner: content-lead
    action: content_git_workflow
    optional: false

metadata:
  supports_execution_mode: [automation, interactive, phase_by_phase, all_phases]
  push_default: true
