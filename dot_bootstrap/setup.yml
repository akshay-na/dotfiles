# setup.yml
- name: Cross-platform setup
  hosts: localhost
  become: true
  gather_facts: true

  vars:
    flyctl_version: "0.1.130"
    pulumi_version: "v3.94.2"

  pre_tasks:
    - name: Set fact for regular user
      ansible.builtin.set_fact:
        remote_regular_user: "{{ ansible_env.SUDO_USER or ansible_user_id }}"

    - name: Detect WSL (only if we're on Linux)
      ansible.builtin.shell: cat /proc/version
      register: wsl_check
      changed_when: false
      failed_when: false
      when: ansible_system == 'Linux'

    - name: Set fact is_wsl
      ansible.builtin.set_fact:
        is_wsl: "{{ 'Microsoft' in wsl_check.stdout }}"
      when: ansible_system == 'Linux'

  roles:
    # 1) WSL role (runs only if on Linux + is_wsl == true)
    - role: wsl
      when: ansible_system == 'Linux' and is_wsl | default(false) == true

    # 2) Linux role (runs only if on Linux + not WSL)
    - role: linux
      when: ansible_system == 'Linux' and is_wsl | default(false) == false

    # 3) macOS role
    - role: macos
      when: ansible_system == 'Darwin'

    # 4) Windows role
    - role: windows
      when: ansible_system == 'Windows_NT'
